    <h1>隱私權政策</h1>
    <p>最後更新日期：2026年4月30日</p>
    <p>ArkEnergy（以下簡稱「本 App」）非常重視您的隱私。本政策說明我們如何處理您的資訊：</p>
    
    <h3>1. 資訊收集與使用</h3>
    <p>本 App 主要用於本地能源數據監控。除非您主動設定雲端備份，否則大部分數據均儲存於您的個人設備中。</p>
    
    <h3>2. 權限說明</h3>
    <p>本 App 可能會要求存取網路權限，僅用於與您的硬體設備通訊或同步數據。</p>
    
    <h3>3. 第三方服務</h3>
    <p>本 App 可能使用 Google Play Services。相關隱私規範請參閱 Google 官方政策。</p>
    
    <h3>4. 聯絡我們</h3>
    <p>若有任何疑問，請透過 GitHub 倉庫提交 Issue 或聯繫開發者。</p>
